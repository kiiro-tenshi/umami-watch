services:
  aniwatch-api:
    image: ghcr.io/ghoshritesh12/aniwatch:latest
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      ANIWATCH_API_PORT: "4000"
      ANIWATCH_API_DEPLOYMENT_ENV: docker
      ANIWATCH_API_CORS_ALLOWED_ORIGINS: "*"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Download from Firebase Console → Project Settings → Service Accounts → Generate new private key
      - ./firebase-service-account.json:/run/secrets/firebase-sa.json
    environment:
      ANIWATCH_API_URL: http://aniwatch-api:4000
      FIREBASE_PROJECT_ID: umami-watch
      FIREBASE_STORAGE_BUCKET: umami-watch.firebasestorage.app
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-sa.json
    depends_on:
      - aniwatch-api
