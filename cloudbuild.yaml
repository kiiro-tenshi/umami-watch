steps:
  # ── Step 1: Mirror aniwatch-api from ghcr.io → GCR (only re-pulls if changed) ──
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'ghcr.io/ghoshritesh12/aniwatch:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'ghcr.io/ghoshritesh12/aniwatch:latest', 'gcr.io/$PROJECT_ID/aniwatch-api:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aniwatch-api:latest']

  # ── Step 2: Deploy aniwatch-api to Cloud Run ──────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aniwatch-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aniwatch-api:latest'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'ANIWATCH_API_PORT=8080,ANIWATCH_API_DEPLOYMENT_ENV=production,ANIWATCH_API_CORS_ALLOWED_ORIGINS=*'

  # ── Step 3: Build main app — tag with git tag + :latest ───────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/umami-watch:$TAG_NAME'
      - '-t'
      - 'gcr.io/$PROJECT_ID/umami-watch:latest'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - '--build-arg'
      - 'VITE_API_BASE_URL=$_VITE_API_BASE_URL'
      - '--build-arg'
      - 'VITE_CONSUMET_API_URL=$_VITE_CONSUMET_API_URL'
      - '--build-arg'
      - 'VITE_TMDB_API_KEY=$_VITE_TMDB_API_KEY'
      - '.'

  # ── Step 4: Push both tags ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/umami-watch']

  # ── Step 5: Deploy main app to Cloud Run ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'umami-watch'
      - '--image'
      - 'gcr.io/$PROJECT_ID/umami-watch:$TAG_NAME'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '5'
      - '--session-affinity'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID,ALLOWED_ORIGINS=$_ALLOWED_ORIGINS,ANIWATCH_API_URL=$_ANIWATCH_API_URL,TURNSTILE_SECRET_KEY=$_TURNSTILE_SECRET_KEY'

images:
  - 'gcr.io/$PROJECT_ID/umami-watch:$TAG_NAME'
  - 'gcr.io/$PROJECT_ID/umami-watch:latest'
  - 'gcr.io/$PROJECT_ID/aniwatch-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
