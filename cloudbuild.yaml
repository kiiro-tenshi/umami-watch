steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/streamtogether'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - '--build-arg'
      - 'VITE_API_BASE_URL=$_VITE_API_BASE_URL'
      - '--build-arg'
      - 'VITE_CONSUMET_API_URL=$_VITE_CONSUMET_API_URL'
      - '--build-arg'
      - 'VITE_TMDB_API_KEY=$_VITE_TMDB_API_KEY'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/streamtogether']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'streamtogether'
      - '--image'
      - 'gcr.io/$PROJECT_ID/streamtogether'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID,ALLOWED_ORIGINS=$_ALLOWED_ORIGINS'
images:
  - 'gcr.io/$PROJECT_ID/streamtogether'
options:
  logging: CLOUD_LOGGING_ONLY
