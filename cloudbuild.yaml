steps:
  # ── Step 1: Mirror aniwatch-api from ghcr.io → GCR ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'ghcr.io/ghoshritesh12/aniwatch:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'ghcr.io/ghoshritesh12/aniwatch:latest', 'gcr.io/$PROJECT_ID/aniwatch-api:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aniwatch-api:latest']

  # ── Step 2: Deploy aniwatch-api to Cloud Run ──────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aniwatch-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aniwatch-api:latest'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--port'
      - '4000'
      - '--cpu-boost'
      - '--set-env-vars'
      - 'ANIWATCH_API_DEPLOYMENT_ENV=docker,ANIWATCH_API_CORS_ALLOWED_ORIGINS=*'

  # ── Step 3: Build main app using secrets for sensitive values ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          -t gcr.io/$PROJECT_ID/umami-watch:$TAG_NAME \
          -t gcr.io/$PROJECT_ID/umami-watch:latest \
          --build-arg VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN \
          --build-arg VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$$VITE_FIREBASE_MESSAGING_SENDER_ID \
          --build-arg VITE_FIREBASE_APP_ID=$$VITE_FIREBASE_APP_ID \
          --build-arg VITE_API_BASE_URL=$$VITE_API_BASE_URL \
          --build-arg VITE_CONSUMET_API_URL=$_VITE_CONSUMET_API_URL \
          --build-arg VITE_TMDB_API_KEY=$$VITE_TMDB_API_KEY \
          --build-arg VITE_TURNSTILE_SITE_KEY=$$VITE_TURNSTILE_SITE_KEY \
          --build-arg VITE_HLS_PROXY_URL=$_VITE_HLS_PROXY_URL \
          .
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_APP_ID
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_TMDB_API_KEY
      - VITE_API_BASE_URL
      - VITE_TURNSTILE_SITE_KEY

  # ── Step 4: Push both tags ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/umami-watch']

  # ── Step 5: Deploy main app to Cloud Run with secrets ─────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'umami-watch'
      - '--image'
      - 'gcr.io/$PROJECT_ID/umami-watch:$TAG_NAME'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '5'
      - '--session-affinity'
      - '--set-secrets'
      - 'FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_STORAGE_BUCKET=FIREBASE_STORAGE_BUCKET:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,ANIWATCH_API_URL=ANIWATCH_API_URL:latest,TURNSTILE_SECRET_KEY=TURNSTILE_SECRET_KEY:latest,/run/secrets/firebase-sa.json=FIREBASE_SERVICE_ACCOUNT:latest'
      - '--set-env-vars'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/firebase-sa.json'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_TMDB_API_KEY/versions/latest
      env: VITE_TMDB_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/VITE_API_BASE_URL/versions/latest
      env: VITE_API_BASE_URL
    - versionName: projects/$PROJECT_ID/secrets/VITE_TURNSTILE_SITE_KEY/versions/latest
      env: VITE_TURNSTILE_SITE_KEY

images:
  - 'gcr.io/$PROJECT_ID/umami-watch:$TAG_NAME'
  - 'gcr.io/$PROJECT_ID/umami-watch:latest'
  - 'gcr.io/$PROJECT_ID/aniwatch-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
